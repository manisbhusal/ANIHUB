<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ANIHUB | Full Feature Dashboard</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; padding: 20px; }
        .nav { background: #111; padding: 20px; border-radius: 12px; display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; border: 1px solid #222; }
        button { padding: 10px 18px; border: 1px solid #ff4757; background: none; color: white; cursor: pointer; border-radius: 6px; font-weight: 600; transition: 0.3s; }
        button:hover { background: #ff4757; transform: translateY(-2px); }
        .active-label { color: #ff4757; font-weight: bold; margin-bottom: 10px; display: block; }
        .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        #json-output { background: #000; color: #00ff00; padding: 20px; border-radius: 12px; font-family: 'Fira Code', monospace; font-size: 12px; white-space: pre-wrap; height: 70vh; overflow-y: auto; border: 1px solid #333; }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; height: 70vh; overflow-y: auto; }
        .p-card { background: #161616; border-radius: 8px; border: 1px solid #222; text-align: center; font-size: 11px; padding-bottom: 5px; }
        .p-card img { width: 100%; height: 160px; object-fit: cover; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <h1 style="margin-bottom:5px;">ANIHUB <span style="color:#ff4757;">MASTER ENGINE</span></h1>
    <span class="active-label" id="current-view">Ready for request...</span>

    <div class="nav">
        <button onclick="api('trending')">Trending</button>
        <button onclick="api('this-season')">This Season</button>
        <button onclick="api('all-time-popular')">All-Time Popular</button>
        <button onclick="api('top-rated')">Top Rated</button>
        <button onclick="api('top-upcoming')">Top Upcoming</button>
        <button onclick="api('recently-updated')">Recently Updated</button>
        <button onclick="api('schedule')">Schedule</button>
        <input type="text" id="sq" placeholder="Search..." style="padding:10px; border-radius:6px; border:none; background:#222; color:white;">
        <button onclick="search()">Search</button>
    </div>

    <div class="layout">
        <div id="json-output">JSON Data will appear here...</div>
        <div id="preview-grid" class="preview-grid"></div>
    </div>

    <script>
        const URL = 'https://anihub-orcin.vercel.app/api';

        async function api(path) {
            document.getElementById('current-view').innerText = "Fetching /" + path + "...";
            try {
                const r = await fetch(`${URL}/${path}`);
                const j = await r.json();
                document.getElementById('json-output').innerText = JSON.stringify(j, null, 2);
                
                const list = j.data?.Page?.media || j.data?.Page?.airingSchedules || [];
                document.getElementById('preview-grid').innerHTML = list.map(x => {
                    const a = x.media ? x.media : x;
                    return `<div class="p-card"><img src="${a.coverImage.large}"><p>${a.title.english || a.title.romaji}</p></div>`;
                }).join('');
            } catch (e) { document.getElementById('json-output').innerText = "Error connecting to server."; }
        }

        function search() { const q = document.getElementById('sq').value; api(`search?q=${q}`); }
    </script>
</body>
</html>
